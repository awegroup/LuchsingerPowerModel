metadata:
  name: Kitepower V3.25
  description: Config for the Kitepower V3.25 soft kite pumping ground gen system
  note: None
  awesIO_version: 0.1.0
  schema: system_schema.yml
assembly:
  connectivity_matrix:
    - [K1, T1]
    - [T2, G1]
components:
  kites:
    - name: Kitepower V3_25
      type: soft_kite_kcu
      version: 1.0
      joints:
        kcu_joint:
          id: K1
      wing:
        name: Kitepower V3.25
        type: LEI_soft_kite
        version: 1.0
        structure:
          projected_surface_area: 19.75 # m2
          mass: 10.6 # kg
      bridle:
        name: Kitepower V3.25 Bridle
        type: LEI_soft_kite_bridle
        version: 1.0
        structure:
          mass: 0
      control_system:
        name: Kitepower V3.25 KCU
        type: kite_control_unit
        version: 1.0
        structure:
          mass: 8.4
  tethers:
    - name: Kitepower V3.25
      type: non_conductive_tether
      version: 1.0
      joints:
        upper_tether_joint:
          id: T1
        lower_tether_joint:
          id: T2
      structure:
        length: 500
        diameter: 0.006
        density: 724.0
        max_tether_force: 8200.0 # N
        conductive: false
  ground_station:
    name: ground station
    type: pumping_ground_gen_station
    version: 1.0
    joints:
      drum_joint:
        id: G1
    structure:
      mass: 0.0
    drums:
      - type: electric_winch
        max_tether_speed: 10.0
    generators:
      - type: permanent_magnet_synchronous
        max_power: 40000.0 # W
        efficiency: 1
    storages:
      - type: battery_bank
        capacity: 100000.0 # Wh
        max_charge_rate: 50000.0 # W
        max_discharge_rate: 50000.0 # W
        efficiency: 1
        state_of_charge_initial: 0.5
